# 1. Store your credentials in variables
CLIENT_ID="YOUR_XRAY_CLIENT_ID"
CLIENT_SECRET="YOUR_XRAY_CLIENT_SECRET"
XRAY_AUTH_URL="https://xray.cloud.getxray.app/api/v2/authenticate"

# 2. Make the POST request to get the token
JWT_TOKEN=$(curl -s -X POST -H "Content-Type: application/json" \
    --data "{\"client_id\": \"$CLIENT_ID\", \"client_secret\": \"$CLIENT_SECRET\"}" \
    $XRAY_AUTH_URL | tr -d '"')

# 3. Verify the token was retrieved (optional)
if [ -z "$JWT_TOKEN" ]; then
    echo "Error: Failed to retrieve JWT token."
    exit 1
fi

echo "Successfully retrieved JWT token."


info.json:
{
    "fields": {
        "project": {
            "key": "YOUR_PROJECT_KEY"
        },
        "summary": "Automated Execution for [Date/Build Name]",
        "issuetype": {
            "name": "Test Execution"
        },
        "customfield_12345": [ "TP-100" ]
        // Replace customfield_12345 with your instance's Test Plan custom field ID
        // Replace TP-100 with the key of your existing Test Plan
    }
}

Step 3: Execute the curl Command

# Set variables
TEST_PLAN_KEY="TP-100"  # Your existing Test Plan key
INFO_FILE="info.json"
RESULTS_FILE="results.xml"
XRAY_IMPORT_URL="https://xray.cloud.getxray.app/api/v2/import/execution/junit/multipart"

# Curl command to create the Test Execution and link to the Test Plan
curl -s -X POST \
     -H "Authorization: Bearer $JWT_TOKEN" \
     -F "info=@$INFO_FILE;type=application/json" \
     -F "results=@$RESULTS_FILE;type=application/xml" \
     "$XRAY_IMPORT_URL"
